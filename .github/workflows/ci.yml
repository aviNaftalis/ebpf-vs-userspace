name: ci

on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # so CI can commit the refreshed results table

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev \
                                  linux-tools-common linux-tools-generic strace make \
                                  python3-matplotlib python3-numpy fonts-humor-sans
          # `bpftool` is a virtual package on the runner; use the generic binary
          # directly (its btf-dump / gen-skeleton work regardless of kernel version).
          BPFTOOL="$(ls /usr/lib/linux-tools/*/bpftool 2>/dev/null | head -1 || true)"
          [ -z "$BPFTOOL" ] && BPFTOOL="$(command -v bpftool || true)"
          echo "Using bpftool: ${BPFTOOL:-NONE}"
          echo "BPFTOOL=$BPFTOOL" >> "$GITHUB_ENV"

      - name: Show kernel / BTF
        run: |
          uname -a
          ls -l /sys/kernel/btf/vmlinux

      - name: Build
        run: make

      - name: Benchmark (root needed for eBPF + strace)
        run: |
          set -o pipefail
          sudo bash ./scripts/bench.sh | tee results.md
          test -s results.md   # fail the step if the benchmark produced nothing
          { echo '## Benchmark'; cat results.md; } >> "$GITHUB_STEP_SUMMARY"

      - name: Render graph + commit refreshed results
        if: github.ref == 'refs/heads/main'
        run: |
          python3 scripts/plot.py results.csv          # -> docs/img/results.png + sizes.png
          python3 scripts/update_readme.py results.md  # table -> README markers
          git add docs/img/results.png docs/img/sizes.png docs/img/cores.png README.md
          if ! git diff --cached --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "ci: refresh benchmark results [skip ci]"
            git push
          fi
